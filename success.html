<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acquisition Complete // Neural Matrix</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { text-align: center; padding-top: 100px; }
        .loader { border: 3px solid #333; border-top: 3px solid #00f3ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 2rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-box { max-width: 600px; margin: 0 auto; padding: 2rem; border: 1px solid #00f3ff; background: rgba(0, 243, 255, 0.05); }
    </style>
</head>
<body>
    <nav class="phantom-nav">
        <a href="/index.html">[ HOME ]</a>
        <a href="/product.html">[ ARMORY ]</a>
    </nav>

    <main class="citadel-container">
        <h1 class="neon-text">// TRANSFER_CONFIRMED</h1>
        
        <div id="loading-state">
            <div class="loader"></div>
            <p style="color:#888;">AUTHENTICATING TRANSACTION ID...</p>
        </div>

        <div id="success-state" style="display:none;">
            <div class="success-box">
                <h2 id="prod-title" style="color:#fff; margin-bottom:1rem;">ARTIFACT UNLOCKED</h2>
                <p style="color:#ccc; margin-bottom:2rem;">The protocol has been transferred to your possession.</p>
                <a id="download-btn" href="#" class="btn-acquire">INITIALIZE DOWNLOAD</a>
            </div>
            <p style="margin-top:2rem; font-size:0.8rem; color:#666;">TRANSACTION ID: <span id="tx-id">SECURE</span></p>
        </div>

        <div id="error-state" style="display:none;">
            <h3 style="color:red;">❌ AUTHENTICATION FAILED</h3>
            <p>Missing or Invalid Product Identifier.</p>
            <a href="/product.html" class="btn-acquire" style="border-color:red; color:red;">RETURN TO ARMORY</a>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('prod');
        
        // Simulating a "verification" delay for effect
        setTimeout(() => {
            document.getElementById('loading-state').style.display = 'none';

            if (!prodId) {
                document.getElementById('error-state').style.display = 'block';
                return;
            }

            fetch('config/registry.json')
                .then(r => r.json())
                .then(data => {
                    // Look up the product by ID
                    const product = data.products.find(p => p.id === prodId);
                    
                    if (product && product.download_file) {
                        // Success: Show download
                        document.getElementById('success-state').style.display = 'block';
                        document.getElementById('prod-title').innerText = product.title + " // UNLOCKED";
                        document.getElementById('download-btn').href = "public/downloads/" + product.download_file;
                        
                        // Generate a fake transaction hash for immersion
                        document.getElementById('tx-id').innerText = "0x" + Math.random().toString(16).substr(2, 8).toUpperCase();
                    } else {
                        // Fail: Product not found
                        document.getElementById('error-state').style.display = 'block';
                        document.querySelector('#error-state p').innerText = "Product ID not found in Registry.";
                    }
                })
                .catch(e => {
                    document.getElementById('error-state').style.display = 'block';
                    console.error(e);
                });
        }, 1500);
    </script>
</body>
</html>
