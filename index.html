<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CITADEL | NEURAL MATRIX</title>
    <style>
        /* --- TITANIUM AESTHETIC --- */
        body {
            background: #020202; /* The Void */
            color: #00ff00; /* Terminal Green */
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* THE DYSON SPHERE CANVAS (Background) */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; /* BEHIND EVERYTHING */
            opacity: 0.8;
        }

        /* HUD SYSTEMS */
        .hud {
            position: fixed;
            padding: 15px;
            font-size: 10px;
            color: #00ffff; /* Cyan Signal */
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }
        .hud-tl { top: 20px; left: 20px; }
        .hud-tr { top: 20px; right: 20px; text-align: right; }

        /* HERO SECTION */
        header {
            text-align: center;
            padding: 15vh 20px 50px;
            /* Transparent gradient so we see the stars */
            background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.8)); 
        }
        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            margin-bottom: 5px;
        }
        .tagline {
            color: #00ffff;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        /* THE ARTIFACT GRID */
        #g {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 20px 20px 120px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* GLASS CARDS (See-through) */
        .artifact {
            border: 1px solid rgba(0, 255, 0, 0.3);
            background: rgba(0, 10, 0, 0.6); /* GLASS EFFECT */
            padding: 30px;
            backdrop-filter: blur(2px);
            transition: 0.3s;
        }
        .artifact:hover {
            border-color: #00ffff;
            background: rgba(0, 20, 20, 0.8);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
        }
        .artifact h2 { margin-top: 0; color: #fff; text-shadow: 0 0 5px #00ff00; }
        .artifact a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .artifact a:hover { background: #00ff00; color: #000; }

        /* FOOTER LORE */
        footer {
            text-align: center;
            padding: 50px;
            color: #555;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        .sov-mark { font-size: 1.5rem; color: #00ff00; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="hud hud-tl">NEURAL MATRIX<br>V 3.1 [LIVE]</div>
    <div class="hud hud-tr">PROTOCOL:<br>SOVEREIGN</div>

    <header>
        <h1>The Citadel</h1>
        <div class="tagline">// THE DYSON SPHERE OF CODE</div>
    </header>

    <div id="g"></div>

    <footer>
        <span class="sov-mark">⟁</span>
        <a href="legal/manifesto.html" style="color:#555;text-decoration:none">READ THE LAW</a>
    </footer>

    <script type="module" src="js/celestium.js"></script>

    <script>
        class Kernel {
            constructor() {
                this.grid = document.getElementById('g');
                this.boot();
            }
            async boot() {
                try {
                    let r = await fetch('./config/public_catalog.json?t=' + Date.now());
                    let catalog = await r.json();
                    Object.entries(catalog).forEach(([key, item]) => {
                        let card = document.createElement('div');
                        card.className = 'artifact';
                        card.innerHTML = `<h2>${item.name}</h2><p>${item.description}</p><a href="${item.price_url}">ACCESS</a>`;
                        this.grid.appendChild(card);
                    });
                } catch (e) {}
            }
        }
        new Kernel();
    </script>
</body>
</html>
