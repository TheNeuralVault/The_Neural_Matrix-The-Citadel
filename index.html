<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CITADEL | NEURAL MATRIX</title>
    <style>
        body { background: #020202; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.8; }
        .hud { position: fixed; padding: 20px; color: #00ffff; border: 1px solid rgba(0,255,255,0.2); backdrop-filter: blur(5px); z-index: 100; }
        .hud-tl { top: 20px; left: 20px; }
        header { text-align: center; padding-top: 25vh; }
        h1 { font-size: 3rem; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px #0f0; }
        #g { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 100px 50px; max-width: 1200px; margin: 0 auto; }
        .artifact { background: rgba(0,20,10,0.6); border: 1px solid rgba(0,255,0,0.3); padding: 30px; backdrop-filter: blur(10px); }
        .artifact h2 { color: #fff; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        .btn { display: block; border: 1px solid #0f0; color: #0f0; padding: 15px; text-align: center; text-decoration: none; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div class="hud hud-tl">SYSTEM: REBOOTED<br>STATUS: SOVEREIGN</div>
    <header>
        <h1>THE CITADEL</h1>
        <div>// WE DO NOT FOLLOW. WE CORRECT. //</div>
    </header>
    <div id="g"></div>
    
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        // CELESTIUM ENGINE (Simplified for restoration)
        const scene = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({alpha:true});
        renderer.setSize(innerWidth, innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Stars
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0;i<5000;i++) pos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({color: 0x00ff00, size: 2});
        const stars = new THREE.Points(geo, mat);
        scene.add(stars);
        cam.position.z = 500;

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.002;
            stars.rotation.x += 0.001;
            renderer.render(scene, cam);
        }
        animate();
    </script>

    <script>
        fetch('./config/public_catalog.json')
            .then(r => r.json())
            .then(data => {
                const g = document.getElementById('g');
                Object.values(data).forEach(item => {
                    g.innerHTML += `
                        <div class="artifact">
                            <h2>${item.name}</h2>
                            <p>${item.description}</p>
                            <a href="${item.price_url}" class="btn">ACQUIRE</a>
                        </div>
                    `;
                });
            })
            .catch(e => document.getElementById('g').innerHTML = "<div style='text-align:center'>:: ORACLE SYNCING... ::</div>");
    </script>
</body>
</html>
