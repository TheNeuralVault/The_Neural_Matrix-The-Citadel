<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL MATRIX | THE CITADEL</title>
    <style>
        /* --- TITANIUM AESTHETIC: GLAMOUR PROTOCOL --- */
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow-x: hidden;
            height: 100vh;
        }

        /* DYSON SPHERE CANVAS (Background) */
        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* THE GLASS HUD */
        .hud {
            position: fixed;
            padding: 15px 25px;
            font-size: 12px;
            color: #00ffff;
            background: rgba(0, 20, 20, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(5px); /* THE BLUR EFFECT */
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }
        .hud-tl { top: 20px; left: 20px; border-left: 3px solid #00ffff; }
        .hud-tr { top: 20px; right: 20px; text-align: right; border-right: 3px solid #00ffff; }

        /* CINEMATIC HERO */
        header {
            text-align: center;
            padding-top: 20vh;
            padding-bottom: 50px;
            background: radial-gradient(circle at center, rgba(0,20,0,0.2), transparent 70%);
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 40px #0f0; /* FLASHY NEON */
            animation: pulse 3s infinite;
        }
        .tagline {
            color: #00ffff;
            letter-spacing: 4px;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* THE ARTIFACT GRID */
        #g {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 20px 40px 120px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HIGH-VALUE ARTIFACT CARD */
        .artifact {
            background: rgba(0, 10, 0, 0.7); /* DARK GLASS */
            border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .artifact::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #0f0, transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }
        .artifact:hover {
            transform: translateY(-10px);
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
        }
        .artifact:hover::before { transform: translateX(100%); }
        
        .artifact h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        .artifact p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        /* THE "BUY" BUTTON (High Value Feel) */
        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            z-index: 2;
        }
        .btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 50px;
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; opacity: 1; }
            50% { text-shadow: 0 0 20px #0f0, 0 0 40px #0f0; opacity: 0.8; }
            100% { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="hud hud-tl">
        NEURAL MATRIX<br>
        SYSTEM: SUPREME
    </div>
    <div class="hud hud-tr">
        ARCHITECT: MAGNUS OPUS<br>
        STATUS: SOVEREIGN
    </div>

    <header>
        <h1>The Citadel</h1>
        <div class="tagline">// ARCHITECTING THE IMPOSSIBLE //</div>
    </header>

    <div id="g"></div>

    <footer>
        ⟁ THE NEURAL VAULT <br>
        LIVING ORGANISM v3.1
    </footer>

    <script type="module" src="js/celestium.js"></script>

    <script>
        class Kernel {
            constructor() {
                this.grid = document.getElementById('g');
                this.boot();
            }
            async boot() {
                try {
                    let r = await fetch('./config/public_catalog.json?t=' + Date.now());
                    let catalog = await r.json();
                    Object.entries(catalog).forEach(([key, item]) => {
                        let card = document.createElement('div');
                        card.className = 'artifact';
                        // Flashy Presentation
                        card.innerHTML = `
                            <h2>${item.name}</h2>
                            <p>${item.description}</p>
                            <a href="${item.price_url}" class="btn">ACQUIRE ARTIFACT</a>
                        `;
                        this.grid.appendChild(card);
                    });
                } catch (e) {
                    console.log(":: WAITING FOR ARTIFACTS ::");
                }
            }
        }
        new Kernel();
    </script>
</body>
</html>
