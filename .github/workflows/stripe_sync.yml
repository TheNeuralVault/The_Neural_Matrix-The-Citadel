name: The Treasury Sync

on:
  push:
    paths:
      - 'config/registry.json'
      - 'scripts/sync_stripe.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-stripe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Citadel
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install stripe

      - name: Run Stripe Sync Protocol
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
        run: python scripts/sync_stripe.py

      - name: Commit Updated Registry
        run: |
          git config --global user.name "Magnus Opus Bot"
          git config --global user.email "bot@neuralmatrixvault.com"
          git add config/registry.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "TREASURY: Auto-generated Payment Links" && git push)
