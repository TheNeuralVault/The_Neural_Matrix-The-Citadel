name: Bunker Guard (Omni Audit)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  enforce-system-bible:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout The Citadel
        uses: actions/checkout@v3

      - name: Setup Python Logic
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install stripe markdown

      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh

      - name: EXECUTE OMNI AUDIT
        run: ./scripts/omni_audit.sh
